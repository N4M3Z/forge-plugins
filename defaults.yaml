# forge-finance default configuration.
# Override: create config.yaml (gitignored) with only the fields you want to change.

skills:
    claude:
        Fakturoid:
        HealthFiling:
        Revolut:
        SecuritiesTax:
        SocialFiling:
        TaxAnalysis:
        TaxFiling:
        TaxReturn:
    gemini:
        Fakturoid:
        HealthFiling:
        Revolut:
        SecuritiesTax:
        SocialFiling:
        TaxAnalysis:
        TaxFiling:
        TaxReturn:
    codex:
        Fakturoid:
        HealthFiling:
        Revolut:
        SecuritiesTax:
        SocialFiling:
        TaxAnalysis:
        TaxFiling:
        TaxReturn:
    opencode:
        Fakturoid:
        HealthFiling:
        Revolut:
        SecuritiesTax:
        SocialFiling:
        TaxAnalysis:
        TaxFiling:
        TaxReturn:

agents:
    TaxAdvisorCZ:
        model: strong
        tools: Read, Grep, Glob, Bash, WebSearch, WebFetch

providers:
    claude:
        target: ".claude"

    gemini:
        target: ".gemini"
        assembly:
            - kebab-case
            - remap-tools

    codex:
        target: ".codex"
        assembly:
            - agents-to-toml
        deploy:
            - rulesync

    opencode:
        target: ".opencode"
        assembly:
            - kebab-case
